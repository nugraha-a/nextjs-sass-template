apiVersion: v1
kind: Secret
metadata:
  name: erp-template-secret
  namespace: erp-template
  labels:
    app.kubernetes.io/name: erp-template
type: Opaque
stringData:
  # ⚠️ Ganti dengan nilai asli sebelum deploy!
  GOOGLE_CLIENT_ID: "your-google-client-id"
  GOOGLE_CLIENT_SECRET: "your-google-client-secret"
  AUTH_COOKIE_SECRET: "your-random-secret-key"
