apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-template
  namespace: erp-template
  labels:
    app.kubernetes.io/name: erp-template
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: erp-template
  template:
    metadata:
      labels:
        app.kubernetes.io/name: erp-template
    spec:
      containers:
        - name: erp-template
          # ⚠️ Ganti dengan image registry kamu
          image: your-registry/erp-template:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: erp-template-config
            - secretRef:
                name: erp-template-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
